  <style>
    /* ============================================================
       WINS PAGE — gamified closed deals
       ============================================================ */

    /* Section headers */
    .wins-section-head {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin: 28px 0 14px;
    }
    .wins-section-head h3 {
      font-size: 1.05rem; font-weight: 800; color: var(--gray-900);
      display: flex; align-items: center; gap: 8px; margin: 0;
    }
    .wins-count-pill {
      font-size: .72rem; font-weight: 700; color: var(--emerald);
      background: var(--emerald-light); border-radius: 20px; padding: 2px 10px;
    }
    .wins-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); margin-bottom: 4px;
    }
    .wins-link-btn {
      background: none; border: none; cursor: pointer;
      font-size: .8rem; font-weight: 700; color: var(--gold); padding: 0;
    }
    .wins-link-btn:hover { text-decoration: underline; }
    .wins-you {
      font-size: .6rem; font-weight: 800; letter-spacing: .5px;
      background: var(--gold); color: #fff; border-radius: 4px; padding: 1px 5px;
      vertical-align: middle;
    }
    /* base .agent-avatar is display:none with only a bg color — give ours full layout */
    .wins-champ-avatar, .wins-runner-avatar, .wins-lb-avatar, .wins-feed-avatar, .wins-mlb-avatar {
      display: flex !important; align-items: center; justify-content: center;
      border-radius: 50%; color: #fff; font-weight: 700;
    }

    /* ---- Three-column row: Leaderboard · Upcoming · Sources ---- */
    /* fluid: 3 equal columns on desktop, auto-drops to 2 then 1 on tablets/phones */
    .wins-tri { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; align-items: start; margin: 22px 0 4px; }
    .wins-tri-card { display: flex; flex-direction: column; }
    .wins-tri-head { padding: 13px 16px; border-bottom: 1px solid var(--gray-100); font-size: .92rem; font-weight: 800; color: var(--gray-900); }
    .wins-tri-head-flex { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    /* Sales/Volume ranking toggle */
    .wins-metric-toggle { display: inline-flex; background: var(--gray-100); border-radius: 8px; padding: 2px; flex-shrink: 0; }
    .wins-mt-btn { border: none; background: none; cursor: pointer; font-size: .68rem; font-weight: 800; color: var(--gray-500); padding: 3px 9px; border-radius: 6px; }
    .wins-mt-btn.active { background: var(--white); color: var(--emerald); box-shadow: var(--shadow-sm); }
    /* de-emphasize the inactive metric column */
    .wins-mlb-sales:not(.active), .wins-mlb-vol:not(.active) { color: var(--gray-400); font-weight: 600; }
    .wins-tri-body { padding: 8px 14px 12px; }
    .wins-tri-empty { text-align: center; padding: 26px 8px; color: var(--gray-400); font-size: .82rem; }

    /* compact leaderboard */
    .wins-mlb-head, .wins-mlb-row { display: flex; align-items: center; gap: 8px; }
    .wins-mlb-head { padding: 6px 4px; font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--gray-400); border-bottom: 1px solid var(--gray-100); }
    .wins-mlb-row { padding: 8px 4px; border-bottom: 1px solid var(--gray-50); font-size: .84rem; }
    .wins-mlb-row:last-child { border-bottom: none; }
    .wins-mlb-row.me { background: linear-gradient(90deg, var(--gold-pale), transparent); border-radius: 8px; }
    .wins-mlb-rank { width: 20px; flex-shrink: 0; text-align: center; font-weight: 800; color: var(--gray-500); }
    .wins-mlb-row.me .wins-mlb-rank { color: var(--gold); }
    .wins-mlb-avatar { width: 26px !important; height: 26px !important; font-size: .62rem !important; flex-shrink: 0; }
    .wins-mlb-name { flex: 1; min-width: 0; font-weight: 700; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wins-mlb-sales { width: 34px; flex-shrink: 0; text-align: right; font-weight: 700; color: var(--gray-700); }
    .wins-mlb-vol { width: 82px; flex-shrink: 0; text-align: right; font-weight: 700; color: var(--gray-900); font-size: .76rem; }

    /* upcoming closings */
    .wins-up-row { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--gray-50); text-decoration: none; color: inherit; }
    .wins-up-row:last-child { border-bottom: none; }
    a.wins-up-row:hover { background: var(--gray-50); border-radius: 8px; }
    .wins-up-badge { min-width: 42px; text-align: center; font-size: .7rem; font-weight: 800; padding: 3px 6px; border-radius: 20px; flex-shrink: 0; }
    .wins-up-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .wins-up-addr { font-size: .82rem; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wins-up-agent { font-size: .68rem; color: var(--gray-400); }
    .wins-up-price { font-size: .82rem; font-weight: 700; color: var(--gray-900); flex-shrink: 0; }

    /* deal sources */
    .wins-src-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
    .wins-src-row:last-child { margin-bottom: 2px; }
    .wins-src-pct { width: 30px; height: 30px; border-radius: 50%; background: var(--indigo-light); color: var(--indigo); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: .6rem; font-weight: 800; }
    .wins-src-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .wins-src-top { display: flex; justify-content: space-between; gap: 8px; }
    .wins-src-name { font-size: .8rem; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wins-src-count { font-size: .8rem; font-weight: 700; color: var(--gray-900); flex-shrink: 0; }
    .wins-src-bar { height: 4px; background: var(--gray-100); border-radius: 99px; overflow: hidden; margin-top: 4px; }
    .wins-src-fill { display: block; height: 100%; background: linear-gradient(90deg, #35BA9C, #3484D0); border-radius: 99px; }
    .wins-src-vol { font-size: .66rem; color: var(--gray-400); margin-top: 2px; }

    /* ---- Hero (slim) ---- */
    .wins-hero {
      position: relative; overflow: hidden;
      background: linear-gradient(120deg, #04261a 0%, #065F46 60%, #0a7a54 100%);
      border-radius: 14px; padding: 15px 20px; margin-bottom: 14px; color: #fff;
    }
    .wins-hero-glow {
      position: absolute; top: -70px; right: -50px; width: 200px; height: 200px;
      border-radius: 50%; background: radial-gradient(circle, rgba(212,175,55,.3), transparent 70%);
      pointer-events: none;
    }
    .wins-hero-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; position: relative; }
    .wins-hero-greet { font-size: 1.15rem; font-weight: 800; letter-spacing: -.3px; }
    .wins-hero-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .wins-tier-chip { display: inline-flex; align-items: center; gap: 4px; font-size: .8rem; font-weight: 800; background: rgba(255,255,255,.94); padding: 3px 11px; border-radius: 20px; }
    .wins-hero-rank { font-size: .8rem; font-weight: 700; color: rgba(255,255,255,.8); }
    .wins-hero-streak { font-size: .8rem; font-weight: 800; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .wins-hero-stats { display: flex; align-items: baseline; gap: 22px; flex-wrap: wrap; margin-top: 11px; position: relative; }
    .wins-hero-stat { display: inline-flex; align-items: baseline; gap: 6px; }
    .wins-hero-stat-val { font-size: 1.3rem; font-weight: 800; letter-spacing: -.4px; }
    .wins-hero-stat-lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .4px; color: rgba(255,255,255,.6); font-weight: 600; }
    .wins-hero-rankline { margin-top: 11px; position: relative; }
    .wins-rank-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .82rem; font-weight: 700; color: #fff;
      background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22);
      padding: 5px 13px; border-radius: 20px;
    }
    .wins-rank-badge.muted { opacity: .8; font-weight: 600; }
    .wins-tier-bar-wrap { margin-top: 11px; position: relative; }
    .wins-tier-bar { height: 6px; border-radius: 20px; background: rgba(255,255,255,.16); overflow: hidden; }
    .wins-tier-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #D4AF37, #F5D77E); transition: width .6s cubic-bezier(.2,.8,.2,1); box-shadow: 0 0 10px rgba(212,175,55,.5); }
    .wins-tier-bar-meta { font-size: .72rem; color: rgba(255,255,255,.72); font-weight: 600; margin-top: 6px; }
    /* team pipeline tiles inside the hero */
    .wins-hero-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; position: relative; }
    .wins-hero-tile { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.16); border-radius: 10px; padding: 10px 13px; }
    .wins-hero-tile-val { font-size: 1.45rem; font-weight: 800; line-height: 1; }
    .wins-hero-tile-lbl { font-size: .66rem; text-transform: uppercase; letter-spacing: .4px; color: rgba(255,255,255,.68); font-weight: 700; margin-top: 5px; }
    .wins-hero-tile-sub { font-size: .78rem; color: rgba(255,255,255,.88); font-weight: 700; margin-top: 3px; }
    @media (max-width: 480px) { .wins-hero-tile-val { font-size: 1.2rem; } .wins-hero-tile-lbl { font-size: .58rem; } }

    /* ---- Goal thermometer ---- */
    .wins-goal { padding: 20px 22px; margin-bottom: 4px; }
    .wins-goal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .wins-goal-title { font-size: .98rem; font-weight: 800; color: var(--gray-900); }
    .wins-thermo {
      position: relative; height: 34px; border-radius: 20px;
      background: var(--gray-100); overflow: hidden;
    }
    .wins-thermo-fill {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg, #1A7F4B, #34D399);
      transition: width .7s cubic-bezier(.2,.8,.2,1);
    }
    .wins-thermo-fill.hit { background: linear-gradient(90deg, #B86B00, #F59E0B, #D4AF37); }
    .wins-thermo-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 800; color: var(--gray-900);
      text-shadow: 0 1px 2px rgba(255,255,255,.6);
    }
    .wins-goal-foot { display: flex; justify-content: space-between; font-size: .82rem; font-weight: 600; color: var(--gray-500); margin-top: 10px; }
    .wins-goal-hit { color: var(--amber); font-weight: 800; }
    .wins-goal-edit { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .wins-goal-dollar { font-size: 1.1rem; font-weight: 800; color: var(--gray-500); }
    .wins-goal-input {
      flex: 1; min-width: 120px; padding: 10px 12px; border: 1.5px solid var(--gray-200);
      border-radius: 8px; font-size: 1rem; font-weight: 700; color: var(--gray-900);
    }
    .wins-goal-input:focus { outline: none; border-color: var(--emerald); }
    .wins-goal-hint { font-size: .8rem; color: var(--gray-400); margin-top: 10px; }

    /* ---- Champion spotlight ---- */
    .wins-spotlight {
      display: flex; align-items: flex-end; justify-content: center; flex-wrap: wrap;
      gap: clamp(14px, 3vw, 44px); row-gap: 24px;
      padding: 36px 16px 28px; position: relative; overflow: hidden;
      background: radial-gradient(ellipse 55% 75% at 50% 116%, rgba(212,175,55,.16), transparent 70%), var(--white);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    }
    /* subtle light rays behind the champion */
    .wins-spotlight-rays {
      position: absolute; top: -26%; left: 50%; width: 340px; height: 340px;
      transform: translateX(-50%);
      background: conic-gradient(from 0deg, transparent 0 8deg, rgba(212,175,55,.09) 8deg 16deg, transparent 16deg 24deg,
        rgba(212,175,55,.09) 24deg 32deg, transparent 32deg 40deg, rgba(212,175,55,.09) 40deg 48deg, transparent 48deg 360deg);
      pointer-events: none; z-index: 0;
    }

    /* champion (center) */
    .wins-champ { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; align-items: center; min-width: 160px; padding: 0 4px; }
    .wins-champ-crown { font-size: 2.9rem; line-height: 1; filter: drop-shadow(0 3px 6px rgba(212,175,55,.55)); animation: winsBob 3s ease-in-out infinite; }
    .wins-champ-ring {
      width: 154px; height: 154px; border-radius: 50%; margin: 4px 0 12px;
      display: flex; align-items: center; justify-content: center;
      background: conic-gradient(from 45deg, #B8860B, #F7E7A6, #D4AF37, #F7E7A6, #B8860B, #F7E7A6, #D4AF37);
      box-shadow: 0 0 0 6px var(--white), 0 12px 30px rgba(212,175,55,.45), 0 0 52px rgba(212,175,55,.35);
    }
    .wins-champ-avatar { width: 134px !important; height: 134px !important; font-size: 2.3rem !important; }
    .wins-champ-tag {
      font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .4px;
      color: #7a5c05; background: linear-gradient(90deg, #F7E7A6, #E6BE52);
      padding: 3px 12px; border-radius: 20px; margin-bottom: 6px;
    }
    .wins-champ-name { font-size: 1.2rem; font-weight: 800; color: var(--gray-900); }
    .wins-champ-vol {
      font-size: 1.9rem; font-weight: 800; letter-spacing: -.5px; margin-top: 3px; color: #B8860B;
      background: linear-gradient(90deg, #B8860B, #E6BE52, #B8860B);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .wins-champ-sub { font-size: .82rem; color: var(--gray-500); font-weight: 600; margin-top: 2px; }
    /* top-3 prizes */
    .wins-podium-prize {
      margin-top: 8px; max-width: 150px; font-size: .68rem; font-weight: 800; line-height: 1.3;
      color: #7a5c05; background: var(--amber-light); border: 1px solid #F1DBA0;
      border-radius: 8px; padding: 4px 9px;
    }
    .wins-podium-prize.champ {
      font-size: .74rem; max-width: 180px;
      background: linear-gradient(90deg, #FBE9BE, #F3D778); border-color: #E6BE52;
    }

    /* runners (flanking) */
    .wins-runner { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; min-width: 118px; padding-bottom: 14px; opacity: .96; }
    .wins-runner-medal { font-size: 2.1rem; line-height: 1; margin-bottom: 7px; }
    .wins-runner-rankpill {
      display: inline-flex; align-items: center; justify-content: center; min-width: 34px; height: 30px;
      padding: 0 11px; margin-bottom: 8px; font-size: .92rem; font-weight: 800;
      color: var(--gray-500); background: var(--gray-100); border-radius: 20px;
    }
    .wins-runner-avatar { width: 106px !important; height: 106px !important; font-size: 1.7rem !important; box-shadow: 0 5px 14px rgba(10,22,40,.16); }
    .wins-runner-name { font-size: 1rem; font-weight: 800; color: var(--gray-800); margin-top: 11px; }
    .wins-runner-vol { font-size: 1.2rem; font-weight: 800; color: var(--gray-700); margin-top: 2px; }
    .wins-runner-sub { font-size: .74rem; color: var(--gray-400); font-weight: 600; }
    .wins-runner.me .wins-runner-avatar { box-shadow: 0 0 0 3px var(--gold), 0 5px 14px rgba(10,22,40,.16); }
    @keyframes winsBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    /* ---- Leaderboard ---- */
    .wins-lb { overflow: hidden; padding: 6px 0; }
    .wins-lb-head {
      display: flex; align-items: center; gap: 10px; padding: 8px 20px;
      font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      color: var(--gray-400); border-bottom: 1px solid var(--gray-100);
    }
    .wins-lb-c { width: 78px; text-align: right; flex-shrink: 0; }
    .wins-lb-row {
      display: flex; align-items: center; gap: 10px; padding: 11px 20px;
      border-bottom: 1px solid var(--gray-50); font-size: .88rem;
    }
    .wins-lb-row:last-child { border-bottom: none; }
    .wins-lb-row.me { background: linear-gradient(90deg, var(--gold-pale), transparent); }
    .wins-lb-rank { font-weight: 800; color: var(--gray-500); }
    .wins-lb-row.me .wins-lb-rank { color: var(--gold); }
    .wins-lb-agent { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .wins-lb-avatar { width: 32px !important; height: 32px !important; font-size: .72rem !important; flex-shrink: 0; }
    .wins-lb-agent-txt { min-width: 0; }
    .wins-lb-name { font-weight: 700; color: var(--gray-800); }
    .wins-lb-gap { display: block; font-size: .7rem; color: var(--gray-400); }
    .wins-lb-c { font-weight: 700; color: var(--gray-800); }
    .wins-lb-vol { width: 108px; }
    .wins-lb-gci { color: var(--emerald); }

    /* ---- Badges ---- */
    .wins-badges {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(158px, 1fr)); gap: 12px;
    }
    .wins-badge {
      background: var(--white); border-radius: 14px; box-shadow: var(--shadow-sm);
      padding: 16px 13px 14px; text-align: center; border: 1.5px solid transparent;
      display: flex; flex-direction: column; align-items: center;
      transition: transform .15s;
    }
    .wins-badge.earned { border-color: var(--gold-light); }
    .wins-badge.earned:hover { transform: translateY(-3px); }
    .wins-badge.locked { opacity: .62; filter: grayscale(.85); background: var(--gray-50); box-shadow: none; border-color: var(--gray-200); }
    .wins-badge-icon { font-size: 2rem; line-height: 1; margin-bottom: 6px; }
    .wins-badge.earned .wins-badge-icon { filter: drop-shadow(0 3px 6px rgba(212,175,55,.4)); }
    .wins-badge-name { font-size: .84rem; font-weight: 800; color: var(--gray-900); }
    .wins-badge-desc { font-size: .7rem; color: var(--gray-500); margin-top: 3px; line-height: 1.35; }
    /* progress track for locked, numeric badges */
    .wins-badge-track { width: 100%; height: 5px; border-radius: 20px; background: var(--gray-200); overflow: hidden; margin-top: 8px; }
    .wins-badge-track-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #B8860B, #E6BE52); }
    .wins-badge-prog { font-size: .72rem; font-weight: 800; color: var(--gray-500); margin-top: 4px; }
    /* prize line — always shown */
    .wins-badge-prize {
      margin-top: auto; width: 100%; box-sizing: border-box;
      font-size: .68rem; font-weight: 700; line-height: 1.3; color: var(--amber);
      background: var(--amber-light); border-radius: 8px; padding: 5px 8px;
      /* auto top-margin pins the prize to the bottom so prizes align across a row */
    }
    .wins-badge-prize.won { color: var(--emerald); background: var(--emerald-light); }

    /* ---- Records ---- */
    .wins-records { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .wins-record {
      background: var(--white); border-radius: 14px; box-shadow: var(--shadow-sm);
      padding: 16px 18px; display: flex; align-items: center; gap: 14px;
      border-left: 4px solid var(--gold);
    }
    .wins-record-icon { font-size: 1.7rem; line-height: 1; }
    .wins-record-body { min-width: 0; }
    .wins-record-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--gray-400); }
    .wins-record-value { font-size: 1.15rem; font-weight: 800; color: var(--gray-900); margin-top: 2px; }
    .wins-record-sub { font-size: .74rem; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ---- Wins feed ---- */
    .wins-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
    .wins-feed-card {
      position: relative; overflow: hidden;
      background: var(--white); border-radius: 14px; box-shadow: var(--shadow-sm);
      padding: 16px 18px 16px 22px; cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .wins-feed-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .wins-feed-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #1A7F4B, #34D399); }
    .wins-feed-card.me .wins-feed-accent { background: linear-gradient(180deg, #D4AF37, #B8860B); }
    .wins-feed-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .wins-feed-avatar { width: 34px !important; height: 34px !important; font-size: .74rem !important; flex-shrink: 0; }
    .wins-feed-who { flex: 1; min-width: 0; }
    .wins-feed-agent { font-size: .85rem; font-weight: 800; color: var(--gray-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wins-feed-date { font-size: .72rem; color: var(--gray-400); }
    .wins-feed-type { font-size: .64rem; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; color: var(--emerald); background: var(--emerald-light); padding: 2px 8px; border-radius: 20px; }
    .wins-feed-addr { font-size: .9rem; font-weight: 700; color: var(--gray-800); line-height: 1.35; margin-bottom: 12px; min-height: 2.4em; }
    .wins-feed-nums { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .wins-feed-price { font-size: 1.15rem; font-weight: 800; color: var(--gray-900); }
    .wins-feed-gci { font-size: .82rem; font-weight: 800; color: var(--emerald); }
    .wins-more { text-align: center; margin-top: 16px; }

    /* ---- Empty ---- */
    .wins-empty { text-align: center; padding: 50px 20px; color: var(--gray-400); }
    .wins-empty-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .wins-empty-title { font-weight: 700; color: var(--gray-600); }
    .wins-empty-sub { font-size: .85rem; margin-top: 4px; }

    /* ---- Celebration overlay ---- */
    .wins-celebrate-overlay {
      position: fixed; inset: 0; z-index: 10040;
      background: rgba(4,38,26,.55); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      animation: winsFade .25s ease;
    }
    .wins-celebrate-card {
      background: #fff; border-radius: 22px; padding: 34px 36px; text-align: center;
      max-width: 400px; width: 100%; box-shadow: 0 30px 80px rgba(0,0,0,.35);
      animation: winsPop .4s cubic-bezier(.2,1.2,.3,1);
    }
    .wins-celebrate-emoji { font-size: 3.4rem; line-height: 1; }
    .wins-celebrate-title { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); margin-top: 10px; }
    .wins-celebrate-addr { font-size: .92rem; color: var(--gray-500); margin-top: 6px; }
    .wins-celebrate-price { font-size: 2.1rem; font-weight: 800; color: var(--emerald); margin-top: 14px; letter-spacing: -.5px; }
    .wins-celebrate-gci { font-size: .95rem; font-weight: 700; color: var(--amber); margin-top: 2px; }
    @keyframes winsPop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes winsFade { from { opacity: 0; } to { opacity: 1; } }

    /* ---- Detail back button (preserved) ---- */
    .detail-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .88rem; font-weight: 600; color: var(--gray-500);
      background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 20px;
      transition: color .15s;
    }
    .detail-back-btn:hover { color: var(--emerald); }
    .detail-back-btn svg { width: 18px; height: 18px; fill: currentColor; }

    @media (max-width: 640px) {
      .wins-hero-stats { gap: 16px; }
      .wins-hero-stat-val { font-size: 1.15rem; }
      .wins-lb-gci { display: none; }
      .wins-spotlight { gap: 14px; padding: 28px 6px 18px; }
      .wins-champ, .wins-runner { min-width: 0; }
      .wins-champ-ring { width: 94px; height: 94px; }
      .wins-champ-avatar { width: 80px !important; height: 80px !important; font-size: 1.45rem !important; }
      .wins-champ-name { font-size: 1.02rem; }
      .wins-champ-vol { font-size: 1.5rem; }
      .wins-runner-avatar { width: 58px !important; height: 58px !important; font-size: 1.05rem !important; }
    }
  </style>
