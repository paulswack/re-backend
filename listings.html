<!DOCTYPE html>
<html lang="en" data-title="Listings — RE Back Office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listings — RE Back Office</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ---- Listing Page Styles ---- */

    /* Stat cards row */
    .lst-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) { .lst-stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .lst-stats-grid { grid-template-columns: 1fr; } }

    /* List row column layout */
    .lst-row-address { flex: 2; min-width: 0; }
    .lst-row-address-text {
      font-weight: 600; color: var(--gray-800);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lst-row-price { width: 120px; font-weight: 700; color: var(--gray-900); text-align: right; flex-shrink: 0; }
    .lst-row-specs { width: 160px; font-size: .82rem; color: var(--gray-500); flex-shrink: 0; }
    .lst-row-agent { width: 180px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .lst-row-agent-name { font-size: .85rem; color: var(--gray-600); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lst-row-status { width: 100px; flex-shrink: 0; text-align: center; }
    .lst-row-date { width: 120px; font-size: .82rem; color: var(--gray-400); text-align: right; flex-shrink: 0; }

    /* List header */
    .list-header {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px;
      font-size: .7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400);
      border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    /* ---- Detail View ---- */
    .detail-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .88rem; font-weight: 600; color: var(--gray-500);
      background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 20px;
      transition: color .15s;
    }
    .detail-back-btn:hover { color: var(--indigo); }
    .detail-back-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .detail-header-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .detail-header-accent { height: 4px; background: var(--indigo); }
    .detail-header-body { padding: 24px 28px 20px; }
    .detail-header-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-bottom: 20px;
    }
    .detail-header-address {
      font-size: 1.35rem; font-weight: 800; color: var(--gray-900); letter-spacing: -.3px;
    }
    .detail-header-price {
      font-size: 1.2rem; font-weight: 700; color: var(--indigo); margin-top: 4px;
    }

    .detail-blocks-row {
      display: flex; gap: 0; background: var(--gray-50); border-radius: 12px;
      overflow: hidden; flex-wrap: wrap;
    }
    .detail-block {
      flex: 1; min-width: 140px; padding: 14px 20px;
      border-right: 1px solid var(--gray-100);
    }
    .detail-block:last-child { border-right: none; }
    .detail-block-label {
      font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400); margin-bottom: 4px;
    }
    .detail-block-value { font-size: .92rem; font-weight: 600; color: var(--gray-800); }

    /* Description card */
    .desc-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .desc-card-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .92rem; font-weight: 700; color: var(--gray-800);
    }
    .desc-card-body { padding: 20px 24px; }

    /* Parties card (checklist) */
    .parties-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }
    .parties-card-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .95rem; font-weight: 700; color: var(--gray-800);
    }

    /* Notes card */
    .notes-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .notes-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .92rem; font-weight: 700; color: var(--gray-800);
    }
    .note-input-area { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); }
    .note-input-area textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
      border-radius: 8px; font-size: .88rem; font-family: inherit;
      resize: vertical; min-height: 60px; color: var(--gray-800);
      transition: border-color .15s;
    }
    .note-input-area textarea:focus {
      border-color: var(--indigo); outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    .note-input-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .note-item {
      padding: 14px 20px; border-bottom: 1px solid var(--gray-50);
    }
    .note-item:last-child { border-bottom: none; }
    .note-meta {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .note-author { font-size: .82rem; font-weight: 600; color: var(--gray-700); }
    .note-time { font-size: .72rem; color: var(--gray-400); }
    .note-text { font-size: .88rem; color: var(--gray-600); line-height: 1.5; }

    @media (max-width: 768px) {
      .lst-row-specs { display: none; }
    }
  </style>
</head>
