<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction Portal — RE Back Office</title>
  <style>
    /* ============================================================
       Client Portal — Standalone Styles
       Clean, branded, client-friendly design
       ============================================================ */

    :root {
      --portal-indigo: #6366F1;
      --portal-indigo-dark: #4F46E5;
      --portal-indigo-light: #EEF2FF;
      --portal-violet: #8B5CF6;
      --portal-emerald: #10B981;
      --portal-emerald-light: #ECFDF5;
      --portal-amber: #F59E0B;
      --portal-amber-light: #FFFBEB;
      --portal-rose: #F43F5E;
      --portal-gray-50: #F8FAFC;
      --portal-gray-100: #F1F5F9;
      --portal-gray-200: #E2E8F0;
      --portal-gray-300: #CBD5E1;
      --portal-gray-400: #94A3B8;
      --portal-gray-500: #64748B;
      --portal-gray-600: #475569;
      --portal-gray-700: #334155;
      --portal-gray-800: #1E293B;
      --portal-gray-900: #0F172A;
      --portal-white: #FFFFFF;
      --portal-font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--portal-font); font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { background: var(--portal-gray-50); color: var(--portal-gray-800); line-height: 1.6; min-height: 100vh; }

    /* ---- Header ---- */
    .portal-header {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #8B5CF6 100%);
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    .portal-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }
    .portal-header::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -5%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
    }
    .portal-header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .portal-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .portal-logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,.2);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .portal-logo-mark svg { width: 22px; height: 22px; fill: #fff; }
    .portal-brand-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.2px;
    }
    .portal-brand-sub {
      font-size: .72rem;
      color: rgba(255,255,255,.7);
      font-weight: 500;
    }
    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 99px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .portal-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34D399;
      animation: portalPulse 2s infinite;
    }
    @keyframes portalPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ---- Main Container ---- */
    .portal-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 28px 60px;
    }

    /* ---- Error State ---- */
    .portal-error {
      text-align: center;
      padding: 80px 40px;
    }
    .portal-error-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #FEE2E2;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .portal-error-icon svg { width: 40px; height: 40px; fill: var(--portal-rose); }
    .portal-error h2 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--portal-gray-900);
      margin-bottom: 8px;
    }
    .portal-error p {
      font-size: .95rem;
      color: var(--portal-gray-500);
      max-width: 400px;
      margin: 0 auto;
    }

    /* ---- Hero Card ---- */
    .portal-hero {
      background: var(--portal-white);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
      padding: 32px 36px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .portal-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--portal-indigo), var(--portal-violet));
    }
    .portal-hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .portal-hero-address {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--portal-gray-900);
      letter-spacing: -.5px;
      line-height: 1.2;
    }
    .portal-hero-price {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--portal-indigo);
      margin-top: 6px;
    }
    .portal-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 99px;
      font-size: .82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .portal-status-active { background: #DBEAFE; color: #1D4ED8; }
    .portal-status-pending { background: #FEF3C7; color: #92400E; }
    .portal-status-closed { background: var(--portal-emerald-light); color: #065F46; }

    /* ---- Progress Stepper ---- */
    .portal-stepper {
      background: var(--portal-white);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
      padding: 32px 36px;
      margin-bottom: 28px;
    }
    .portal-stepper-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--portal-gray-800);
      margin-bottom: 28px;
    }
    .stepper-track {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .stepper-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .stepper-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      font-weight: 800;
      border: 3px solid var(--portal-gray-200);
      background: var(--portal-white);
      color: var(--portal-gray-400);
      position: relative;
      z-index: 2;
      transition: all .3s;
    }
    .stepper-step.completed .stepper-circle {
      background: var(--portal-indigo);
      border-color: var(--portal-indigo);
      color: #fff;
    }
    .stepper-step.active .stepper-circle {
      background: var(--portal-white);
      border-color: var(--portal-indigo);
      color: var(--portal-indigo);
      box-shadow: 0 0 0 6px rgba(99,102,241,.15);
    }
    .stepper-label {
      margin-top: 10px;
      font-size: .72rem;
      font-weight: 600;
      color: var(--portal-gray-400);
      text-align: center;
      max-width: 90px;
      line-height: 1.3;
    }
    .stepper-step.completed .stepper-label { color: var(--portal-indigo); }
    .stepper-step.active .stepper-label { color: var(--portal-indigo); font-weight: 700; }

    .stepper-line {
      position: absolute;
      top: 22px;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 0;
    }
    .stepper-line-bg {
      position: absolute;
      top: 0;
      left: calc(50% / 6 + 22px);
      right: calc(50% / 6 + 22px);
      height: 3px;
      background: var(--portal-gray-200);
      border-radius: 3px;
    }
    .stepper-line-fill {
      position: absolute;
      top: 0;
      left: calc(50% / 6 + 22px);
      height: 3px;
      background: var(--portal-indigo);
      border-radius: 3px;
      transition: width .5s ease;
    }

    /* ---- Key Info Grid ---- */
    .portal-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .portal-info-card {
      background: var(--portal-white);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .portal-info-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .portal-info-icon svg { width: 22px; height: 22px; fill: currentColor; }
    .portal-info-icon.indigo { background: var(--portal-indigo-light); color: var(--portal-indigo); }
    .portal-info-icon.emerald { background: var(--portal-emerald-light); color: var(--portal-emerald); }
    .portal-info-icon.amber { background: var(--portal-amber-light); color: var(--portal-amber); }
    .portal-info-icon.violet { background: #F5F3FF; color: var(--portal-violet); }
    .portal-info-label { font-size: .72rem; font-weight: 600; color: var(--portal-gray-400); text-transform: uppercase; letter-spacing: .4px; }
    .portal-info-value { font-size: .95rem; font-weight: 700; color: var(--portal-gray-800); margin-top: 2px; }

    /* ---- Party Cards ---- */
    .portal-parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .portal-party-card {
      background: var(--portal-white);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      padding: 24px;
    }
    .portal-party-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .portal-party-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .portal-party-icon svg { width: 18px; height: 18px; fill: currentColor; }
    .portal-party-icon.buyer { background: #DBEAFE; color: #2563EB; }
    .portal-party-icon.seller { background: #F5F3FF; color: #7C3AED; }
    .portal-party-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--portal-gray-400);
    }
    .portal-party-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--portal-gray-800);
      margin-bottom: 10px;
    }
    .portal-party-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      color: var(--portal-gray-600);
      margin-bottom: 6px;
    }
    .portal-party-detail svg { width: 16px; height: 16px; fill: var(--portal-gray-400); flex-shrink: 0; }
    .portal-party-empty {
      font-size: .88rem;
      color: var(--portal-gray-400);
      font-style: italic;
      padding: 10px 0;
    }

    /* ---- Section Cards ---- */
    .portal-section {
      background: var(--portal-white);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
      margin-bottom: 28px;
      overflow: hidden;
    }
    .portal-section-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--portal-gray-100);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .portal-section-header svg { width: 20px; height: 20px; fill: var(--portal-indigo); }
    .portal-section-header h3 {
      font-size: .95rem;
      font-weight: 700;
      color: var(--portal-gray-800);
    }
    .portal-section-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 8px;
      border-radius: 99px;
      background: var(--portal-indigo-light);
      color: var(--portal-indigo);
      font-size: .72rem;
      font-weight: 700;
    }
    .portal-section-body { padding: 0; }

    /* ---- Timeline Items ---- */
    .portal-timeline-item {
      padding: 18px 28px;
      border-bottom: 1px solid var(--portal-gray-50);
      display: flex;
      gap: 14px;
    }
    .portal-timeline-item:last-child { border-bottom: none; }
    .portal-timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--portal-indigo);
      flex-shrink: 0;
      margin-top: 6px;
    }
    .portal-timeline-content { flex: 1; }
    .portal-timeline-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .portal-timeline-author { font-size: .82rem; font-weight: 600; color: var(--portal-gray-700); }
    .portal-timeline-time { font-size: .72rem; color: var(--portal-gray-400); }
    .portal-timeline-text { font-size: .88rem; color: var(--portal-gray-600); line-height: 1.6; }

    /* ---- Task Items ---- */
    .portal-task-item {
      padding: 14px 28px;
      border-bottom: 1px solid var(--portal-gray-50);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .portal-task-item:last-child { border-bottom: none; }
    .portal-task-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--portal-gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .portal-task-check.done {
      background: var(--portal-emerald);
      border-color: var(--portal-emerald);
    }
    .portal-task-check.done svg { width: 14px; height: 14px; fill: #fff; }
    .portal-task-title { flex: 1; font-size: .88rem; color: var(--portal-gray-700); }
    .portal-task-item.done .portal-task-title { text-decoration: line-through; color: var(--portal-gray-400); }
    .portal-task-due {
      font-size: .72rem;
      font-weight: 600;
      color: var(--portal-gray-400);
      flex-shrink: 0;
    }
    .portal-task-priority {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .portal-task-priority.high { background: #FEE2E2; color: #991B1B; }
    .portal-task-priority.urgent { background: #FDE8E8; color: #7F1D1D; }
    .portal-task-priority.medium { background: #FEF3C7; color: #92400E; }
    .portal-task-priority.low { background: #DBEAFE; color: #1D4ED8; }

    /* ---- Appointment Items ---- */
    .portal-appt-item {
      padding: 16px 28px;
      border-bottom: 1px solid var(--portal-gray-50);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .portal-appt-item:last-child { border-bottom: none; }
    .portal-appt-date-box {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--portal-indigo-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .portal-appt-date-month { font-size: .6rem; font-weight: 700; color: var(--portal-indigo); text-transform: uppercase; }
    .portal-appt-date-day { font-size: 1.1rem; font-weight: 800; color: var(--portal-indigo); line-height: 1; }
    .portal-appt-info { flex: 1; }
    .portal-appt-title { font-size: .9rem; font-weight: 600; color: var(--portal-gray-800); }
    .portal-appt-meta { font-size: .78rem; color: var(--portal-gray-400); margin-top: 2px; }
    .portal-appt-category {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .portal-appt-cat-showing { background: var(--portal-indigo-light); color: var(--portal-indigo); }
    .portal-appt-cat-inspection { background: var(--portal-amber-light); color: var(--portal-amber); }
    .portal-appt-cat-appraisal { background: #F5F3FF; color: var(--portal-violet); }
    .portal-appt-cat-closing { background: var(--portal-emerald-light); color: var(--portal-emerald); }
    .portal-appt-cat-meeting { background: #FFF1F2; color: var(--portal-rose); }
    .portal-appt-cat-other { background: var(--portal-gray-100); color: var(--portal-gray-500); }

    /* ---- Documents Placeholder ---- */
    .portal-docs-placeholder {
      padding: 40px 28px;
      text-align: center;
    }
    .portal-docs-placeholder svg { width: 48px; height: 48px; fill: var(--portal-gray-200); margin-bottom: 12px; }
    .portal-docs-placeholder p { font-size: .88rem; color: var(--portal-gray-400); }

    /* ---- Empty State ---- */
    .portal-empty {
      padding: 30px 28px;
      text-align: center;
      font-size: .85rem;
      color: var(--portal-gray-400);
      font-style: italic;
    }

    /* ---- Footer ---- */
    .portal-footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 28px 40px;
      text-align: center;
      border-top: 1px solid var(--portal-gray-200);
    }
    .portal-footer-powered {
      font-size: .78rem;
      color: var(--portal-gray-400);
      margin-bottom: 6px;
    }
    .portal-footer-powered strong { color: var(--portal-gray-500); font-weight: 700; }
    .portal-footer-contact {
      font-size: .82rem;
      color: var(--portal-gray-500);
    }
    .portal-footer-contact a { color: var(--portal-indigo); text-decoration: none; }
    .portal-footer-contact a:hover { text-decoration: underline; }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .portal-header-inner { flex-direction: column; gap: 12px; align-items: flex-start; }
      .portal-hero { padding: 24px 20px; }
      .portal-hero-address { font-size: 1.25rem; }
      .portal-hero-price { font-size: 1.1rem; }
      .portal-stepper { padding: 24px 16px; }
      .stepper-track { flex-wrap: wrap; gap: 8px; justify-content: center; }
      .stepper-step { min-width: 70px; }
      .stepper-line { display: none; }
      .stepper-circle { width: 36px; height: 36px; font-size: .7rem; }
      .portal-parties { grid-template-columns: 1fr; }
      .portal-info-grid { grid-template-columns: 1fr 1fr; }
      .portal-main { padding: 20px 16px 40px; }
    }

    @media (max-width: 480px) {
      .portal-info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="portal-header">
    <div class="portal-header-inner">
      <div class="portal-brand">
        <div class="portal-logo-mark">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div>
          <div class="portal-brand-text" id="portalBrandName">RE Back Office</div>
          <div class="portal-brand-sub" id="portalBrandSub">Real Estate Team</div>
        </div>
      </div>
      <div class="portal-badge">
        <span class="portal-badge-dot"></span>
        Transaction Portal
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="portal-main" id="portalMain">
    <!-- Rendered by JS -->
  </div>

  <!-- Footer -->
  <footer class="portal-footer" id="portalFooter" style="display:none;">
    <div class="portal-footer-powered">Powered by <strong>RE Back Office</strong></div>
    <div class="portal-footer-contact" id="portalFooterContact"></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/client-portal.js"></script>
</body>
</html>
