<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — RE Back Office</title>
  <style>
    /* ============================================================
       Client Portal — Standalone Styles
       Modern, clean, client-friendly
       ============================================================ */

    :root {
      --p-indigo: #6366F1;
      --p-indigo-dark: #4F46E5;
      --p-indigo-light: #EEF2FF;
      --p-violet: #8B5CF6;
      --p-emerald: #10B981;
      --p-emerald-light: #ECFDF5;
      --p-amber: #F59E0B;
      --p-amber-light: #FFFBEB;
      --p-rose: #F43F5E;
      --p-50: #F8FAFC;
      --p-100: #F1F5F9;
      --p-200: #E2E8F0;
      --p-300: #CBD5E1;
      --p-400: #94A3B8;
      --p-500: #64748B;
      --p-600: #475569;
      --p-700: #334155;
      --p-800: #1E293B;
      --p-900: #0F172A;
      --p-white: #FFFFFF;
      --p-font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      --p-radius: 16px;
      --p-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--p-font); font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { background: var(--p-50); color: var(--p-800); line-height: 1.6; min-height: 100vh; }

    /* ---- Header ---- */
    .portal-header {
      background: linear-gradient(135deg, var(--p-indigo-dark) 0%, #7C3AED 50%, var(--p-violet) 100%);
      position: relative;
      overflow: hidden;
    }
    .portal-header::before {
      content: '';
      position: absolute;
      top: -60%;
      right: -8%;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }
    .portal-header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .portal-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .portal-logo-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
    }
    .portal-logo-mark svg { width: 18px; height: 18px; fill: #fff; }
    .portal-brand-text { font-size: .95rem; font-weight: 700; color: #fff; }
    .portal-brand-sub { font-size: .68rem; color: rgba(255,255,255,.65); font-weight: 500; }
    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 99px;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: .72rem;
      font-weight: 600;
    }
    .portal-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34D399;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    /* ---- Container ---- */
    .portal-main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 28px 60px;
    }

    /* ---- Error ---- */
    .portal-error { text-align: center; padding: 80px 40px; }
    .portal-error-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: #FEE2E2;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .portal-error-icon svg { width: 36px; height: 36px; fill: var(--p-rose); }
    .portal-error h2 { font-size: 1.25rem; font-weight: 800; color: var(--p-900); margin-bottom: 6px; }
    .portal-error p { font-size: .9rem; color: var(--p-500); max-width: 380px; margin: 0 auto; }

    /* ---- Hero Card ---- */
    .portal-hero {
      background: var(--p-white);
      border-radius: var(--p-radius);
      box-shadow: var(--p-shadow);
      padding: 28px 32px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: relative;
      overflow: hidden;
    }
    .portal-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--p-indigo), var(--p-violet));
    }
    .portal-hero-hello {
      font-size: .82rem;
      font-weight: 600;
      color: var(--p-indigo);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .portal-hero-address {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--p-900);
      letter-spacing: -.4px;
      line-height: 1.2;
    }
    .portal-hero-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--p-indigo);
      margin-top: 4px;
    }
    .portal-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      flex-shrink: 0;
    }
    .portal-status-active { background: #DBEAFE; color: #1D4ED8; }
    .portal-status-new { background: #F5F3FF; color: #6D28D9; }
    .portal-status-pending { background: #FEF3C7; color: #92400E; }
    .portal-status-closed { background: var(--p-emerald-light); color: #065F46; }
    .portal-status-sold { background: var(--p-emerald-light); color: #065F46; }

    /* ---- Generic Card ---- */
    .portal-card {
      background: var(--p-white);
      border-radius: var(--p-radius);
      box-shadow: var(--p-shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .portal-card-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--p-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .portal-card-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--p-800);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .portal-title-icon { width: 20px; height: 20px; fill: var(--p-indigo); }
    .portal-card-meta { font-size: .78rem; font-weight: 600; color: var(--p-indigo); }
    .portal-count-badge {
      min-width: 24px; height: 24px;
      padding: 0 8px;
      border-radius: 99px;
      background: var(--p-indigo-light);
      color: var(--p-indigo);
      font-size: .72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Details Row ---- */
    .portal-details-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .portal-detail-item {
      background: var(--p-white);
      border-radius: var(--p-radius);
      box-shadow: var(--p-shadow);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .portal-detail-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .portal-detail-icon svg { width: 20px; height: 20px; fill: currentColor; }
    .portal-detail-icon.indigo { background: var(--p-indigo-light); color: var(--p-indigo); }
    .portal-detail-icon.emerald { background: var(--p-emerald-light); color: var(--p-emerald); }
    .portal-detail-icon.violet { background: #F5F3FF; color: var(--p-violet); }
    .portal-detail-label { font-size: .68rem; font-weight: 600; color: var(--p-400); text-transform: uppercase; letter-spacing: .4px; }
    .portal-detail-value { font-size: .88rem; font-weight: 700; color: var(--p-800); margin-top: 1px; }

    /* ---- Stepper ---- */
    .portal-stepper { padding: 24px 28px 28px; }
    .stepper-track {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .stepper-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .stepper-circle {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 800;
      border: 3px solid var(--p-200);
      background: var(--p-white);
      color: var(--p-400);
      position: relative; z-index: 2;
      transition: all .3s;
    }
    .stepper-circle svg { width: 18px; height: 18px; fill: #fff; }
    .stepper-step.completed .stepper-circle {
      background: var(--p-indigo);
      border-color: var(--p-indigo);
      color: #fff;
    }
    .stepper-step.active .stepper-circle {
      border-color: var(--p-indigo);
      color: var(--p-indigo);
      box-shadow: 0 0 0 5px rgba(99,102,241,.12);
    }
    .stepper-label {
      margin-top: 8px;
      font-size: .65rem;
      font-weight: 600;
      color: var(--p-400);
      text-align: center;
      max-width: 80px;
      line-height: 1.3;
    }
    .stepper-step.completed .stepper-label { color: var(--p-indigo); }
    .stepper-step.active .stepper-label { color: var(--p-indigo); font-weight: 700; }

    .stepper-line {
      position: absolute;
      top: 20px;
      left: 8.33%;
      right: 8.33%;
      height: 3px;
      z-index: 0;
    }
    .stepper-line-bg {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--p-200);
      border-radius: 3px;
    }
    .stepper-line-fill {
      position: absolute;
      top: 0; left: 0;
      height: 3px;
      background: var(--p-indigo);
      border-radius: 3px;
      transition: width .5s ease;
    }

    /* ---- Timeline ---- */
    .portal-timeline { padding: 8px 0; }
    .portal-timeline-item {
      display: flex;
      gap: 16px;
      padding: 0 28px;
    }
    .portal-timeline-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 40px;
    }
    .portal-timeline-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--p-50);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .portal-timeline-line {
      width: 2px;
      flex: 1;
      min-height: 16px;
      background: var(--p-100);
      margin: 4px 0;
    }
    .portal-timeline-body {
      flex: 1;
      padding: 8px 0 24px;
      min-width: 0;
    }
    .portal-timeline-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--p-800);
      line-height: 1.4;
    }
    .portal-timeline-detail {
      font-size: .84rem;
      color: var(--p-500);
      margin-top: 4px;
      line-height: 1.55;
    }
    .portal-timeline-time {
      font-size: .7rem;
      color: var(--p-400);
      margin-top: 6px;
    }

    /* ---- New Badge ---- */
    .portal-new-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 99px;
      background: var(--p-indigo);
      color: #fff;
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      vertical-align: middle;
      margin-left: 6px;
      animation: fadeInBadge .3s ease;
    }
    @keyframes fadeInBadge { from { opacity: 0; transform: scale(.8); } to { opacity: 1; transform: scale(1); } }
    .portal-timeline-icon.new {
      background: var(--p-indigo-light);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    /* ---- Empty State ---- */
    .portal-empty {
      padding: 40px 28px;
      text-align: center;
    }
    .portal-empty svg { width: 40px; height: 40px; fill: var(--p-200); margin-bottom: 12px; }
    .portal-empty p { font-size: .85rem; color: var(--p-400); max-width: 320px; margin: 0 auto; }

    /* ---- Agent Card ---- */
    .portal-agent-card {
      background: var(--p-white);
      border-radius: var(--p-radius);
      box-shadow: var(--p-shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .portal-agent-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 28px;
    }
    .portal-agent-photo {
      width: 52px; height: 52px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--p-indigo);
      display: flex; align-items: center; justify-content: center;
    }
    .portal-agent-photo img { width: 100%; height: 100%; object-fit: cover; }
    .portal-agent-initials { color: #fff; font-size: .9rem; font-weight: 700; }
    .portal-agent-info { flex: 1; min-width: 0; }
    .portal-agent-name { font-size: .95rem; font-weight: 700; color: var(--p-800); }
    .portal-agent-role { font-size: .75rem; color: var(--p-400); margin-top: 1px; }
    .portal-agent-actions { display: flex; gap: 8px; }
    .portal-agent-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 10px;
      background: var(--p-indigo);
      color: #fff;
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s;
    }
    .portal-agent-btn:hover { background: var(--p-indigo-dark); }
    .portal-agent-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* ---- Help Card ---- */
    .portal-help-card {
      background: var(--p-indigo-light);
      border-radius: var(--p-radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .portal-help-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--p-indigo);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .portal-help-icon svg { width: 20px; height: 20px; fill: #fff; }
    .portal-help-title { font-size: .88rem; font-weight: 700; color: var(--p-800); }
    .portal-help-text { font-size: .8rem; color: var(--p-500); margin-top: 2px; line-height: 1.5; }

    /* ---- Footer ---- */
    .portal-footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 28px 40px;
      text-align: center;
      border-top: 1px solid var(--p-200);
    }
    .portal-footer-powered { font-size: .75rem; color: var(--p-400); margin-bottom: 4px; }
    .portal-footer-powered strong { color: var(--p-500); font-weight: 700; }
    .portal-footer-contact { font-size: .8rem; color: var(--p-500); }
    .portal-footer-contact a { color: var(--p-indigo); text-decoration: none; }
    .portal-footer-contact a:hover { text-decoration: underline; }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .portal-header-inner { flex-direction: column; gap: 10px; align-items: flex-start; }
      .portal-hero { padding: 22px 20px; }
      .portal-hero-address { font-size: 1.15rem; }
      .portal-details-row { grid-template-columns: 1fr; }
      .portal-stepper { padding: 20px 16px 24px; }
      .stepper-track { flex-wrap: wrap; gap: 6px; justify-content: center; }
      .stepper-step { min-width: 60px; }
      .stepper-line { display: none; }
      .stepper-circle { width: 34px; height: 34px; font-size: .68rem; }
      .portal-main { padding: 20px 16px 40px; }
      .portal-timeline-item { padding: 0 20px; }
      .portal-agent-inner { flex-wrap: wrap; }
    }

    @media (max-width: 480px) {
      .portal-details-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="portal-header">
    <div class="portal-header-inner">
      <div class="portal-brand">
        <div class="portal-logo-mark">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div>
          <div class="portal-brand-text" id="portalBrandName">RE Back Office</div>
          <div class="portal-brand-sub" id="portalBrandSub">Real Estate Team</div>
        </div>
      </div>
      <div class="portal-badge">
        <span class="portal-badge-dot"></span>
        Client Portal
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="portal-main" id="portalMain"></div>

  <!-- Footer -->
  <footer class="portal-footer" id="portalFooter" style="display:none;">
    <div class="portal-footer-powered">Powered by <strong>RE Back Office</strong></div>
    <div class="portal-footer-contact" id="portalFooterContact"></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/client-portal.js"></script>
</body>
</html>
