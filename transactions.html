<!DOCTYPE html>
<html lang="en" data-title="Transactions — RE Back Office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — RE Back Office</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ---- Transaction Page Styles ---- */

    /* Stat cards row */
    .txn-stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 1100px) { .txn-stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 680px) { .txn-stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .txn-stats-grid { grid-template-columns: 1fr; } }

    /* List row column layout */
    .txn-row-address { flex: 2; min-width: 0; }
    .txn-row-address-text {
      font-weight: 600; color: var(--gray-800);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .txn-row-price { width: 120px; font-weight: 700; color: var(--gray-900); text-align: right; flex-shrink: 0; }
    .txn-row-agent { width: 180px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .txn-row-agent-name { font-size: .85rem; color: var(--gray-600); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-row-status { width: 100px; flex-shrink: 0; text-align: center; }
    .txn-row-date { width: 120px; font-size: .82rem; color: var(--gray-400); text-align: right; flex-shrink: 0; }

    /* List header */
    .list-header {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px;
      font-size: .7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400);
      border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    /* ---- Detail View ---- */
    .detail-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .88rem; font-weight: 600; color: var(--gray-500);
      background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 20px;
      transition: color .15s;
    }
    .detail-back-btn:hover { color: var(--indigo); }
    .detail-back-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .detail-header-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .detail-header-accent { height: 4px; background: var(--indigo); }
    .detail-header-body { padding: 24px 28px 20px; }
    .detail-header-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-bottom: 20px;
    }
    .detail-header-address {
      font-size: 1.35rem; font-weight: 800; color: var(--gray-900); letter-spacing: -.3px;
    }
    .detail-header-price {
      font-size: 1.2rem; font-weight: 700; color: var(--indigo); margin-top: 4px;
    }
    .detail-header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .detail-blocks-row {
      display: flex; gap: 0; background: var(--gray-50); border-radius: 12px;
      overflow: hidden; flex-wrap: wrap;
    }
    .detail-block {
      flex: 1; min-width: 140px; padding: 14px 20px;
      border-right: 1px solid var(--gray-100);
    }
    .detail-block:last-child { border-right: none; }
    .detail-block-label {
      font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400); margin-bottom: 4px;
    }
    .detail-block-value { font-size: .92rem; font-weight: 600; color: var(--gray-800); }

    /* Parties card */
    .parties-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }
    .parties-card-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .95rem; font-weight: 700; color: var(--gray-800);
    }
    .parties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .party-section { padding: 20px 24px; }
    .party-section:first-child { border-right: 1px solid var(--gray-100); }
    .party-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400); margin-bottom: 12px;
    }
    .party-field { margin-bottom: 10px; }
    .party-field-label { font-size: .72rem; color: var(--gray-400); margin-bottom: 2px; }
    .party-field-value { font-size: .88rem; color: var(--gray-800); font-weight: 500; }
    .party-empty {
      font-size: .85rem; color: var(--gray-400); font-style: italic; margin-bottom: 12px;
    }
    .party-add-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .82rem; font-weight: 600; color: var(--indigo);
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .party-add-btn:hover { text-decoration: underline; }
    .party-edit-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .78rem; font-weight: 600; color: var(--gray-400);
      background: none; border: none; cursor: pointer; padding: 0; margin-top: 4px;
    }
    .party-edit-btn:hover { color: var(--indigo); }

    /* Two-column detail layout */
    .detail-columns {
      display: grid; grid-template-columns: 1fr 400px; gap: 24px;
    }
    @media (max-width: 960px) {
      .detail-columns { grid-template-columns: 1fr; }
      .parties-grid { grid-template-columns: 1fr; }
      .party-section:first-child { border-right: none; border-bottom: 1px solid var(--gray-100); }
    }

    /* Activity / Notes */
    .notes-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .notes-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .92rem; font-weight: 700; color: var(--gray-800);
    }
    .note-input-area { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); }
    .note-input-area textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
      border-radius: 8px; font-size: .88rem; font-family: inherit;
      resize: vertical; min-height: 60px; color: var(--gray-800);
      transition: border-color .15s;
    }
    .note-input-area textarea:focus {
      border-color: var(--indigo); outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    .note-input-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .note-item {
      padding: 14px 20px; border-bottom: 1px solid var(--gray-50);
    }
    .note-item:last-child { border-bottom: none; }
    .note-meta {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .note-author { font-size: .82rem; font-weight: 600; color: var(--gray-700); }
    .note-time { font-size: .72rem; color: var(--gray-400); }
    .note-text { font-size: .88rem; color: var(--gray-600); line-height: 1.5; }

    /* Right column cards */
    .side-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .side-card-header {
      padding: 12px 16px;
      font-size: .85rem; font-weight: 700; color: #fff;
    }
    .side-card-header.amber { background: var(--amber); }
    .side-card-header.emerald { background: var(--emerald); }
    .side-card-body { padding: 16px; }
    .side-card-body .form-group { margin-bottom: 10px; }
    .side-card-body .form-group label {
      display: block; font-size: .78rem; font-weight: 600;
      color: var(--gray-600); margin-bottom: 3px;
    }
    .side-card-body .form-group input,
    .side-card-body .form-group select,
    .side-card-body .form-group textarea {
      width: 100%; padding: 7px 12px; border: 1.5px solid var(--gray-200);
      border-radius: 8px; font-size: .85rem; color: var(--gray-800);
      background: var(--white); transition: border-color .15s;
    }
    .side-card-body .form-group input:focus,
    .side-card-body .form-group select:focus {
      border-color: var(--indigo); outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    .side-card-body .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Task / appointment items in right column */
    .side-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--gray-50);
      font-size: .85rem;
    }
    .side-list-item:last-child { border-bottom: none; }
    .side-list-item input[type="checkbox"] { accent-color: var(--indigo); flex-shrink: 0; }
    .side-list-done { text-decoration: line-through; color: var(--gray-400); }
    .side-list-title { flex: 1; color: var(--gray-700); }
    .side-list-meta { font-size: .72rem; color: var(--gray-400); flex-shrink: 0; }
    .side-list-header {
      padding: 10px 16px; font-size: .78rem; font-weight: 700;
      color: var(--gray-500); border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
    }
    .side-list-empty {
      padding: 16px; font-size: .82rem; color: var(--gray-400);
      text-align: center; font-style: italic;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-mark"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div><div class="sidebar-logo-text">RE Back Office</div><div class="sidebar-logo-sub">Real Estate Tools</div></div>
      </div>
      <div class="sidebar-user" id="sidebarUser">
        <div class="sidebar-user-avatar" id="sidebarAvatar">--</div>
        <div><div class="sidebar-user-name" id="sidebarName">Loading...</div><div class="sidebar-user-role" id="sidebarRole"></div></div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Menu</div>
        <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Dashboard</a>
        <a href="transactions.html" class="nav-item" data-page="transactions.html"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>Transactions</a>
        <a href="listings.html" class="nav-item" data-page="listings.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Listings</a>
        <a href="leaderboard.html" class="nav-item" data-page="leaderboard.html"><svg viewBox="0 0 24 24"><path d="M7.5 21H2V9h5.5v12zm7.25-18h-5.5v18h5.5V3zM22 11h-5.5v10H22V11z"/></svg>Leaderboard</a>
        <a href="tax-center.html" class="nav-item" data-page="tax-center.html"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Tax Center</a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" id="logoutBtn"><svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="topbar-title">
          <h1>Transactions</h1>
          <p>Manage your deals from contract to close.</p>
        </div>
        <div class="topbar-actions"></div>
      </div>

      <div class="page-body" id="pageBody">
        <!-- Content rendered by JS -->
      </div>
    </main>
  </div>

  <!-- Add/Edit Transaction Modal -->
  <div class="modal-overlay" id="txnModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 id="modalTitle">Add Transaction</h3>
        <button class="modal-close" data-action="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="txnForm">
          <div class="form-group">
            <label for="txnAddress">Address *</label>
            <input type="text" id="txnAddress" required placeholder="123 Main St, City, ST 12345">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="txnPrice">Price *</label>
              <input type="number" id="txnPrice" required placeholder="500000" min="0">
            </div>
            <div class="form-group">
              <label for="txnAgent">Agent *</label>
              <select id="txnAgent"><option value="">Select agent...</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="txnStatus">Status</label>
              <select id="txnStatus">
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="closed">Closed</option>
              </select>
            </div>
            <div class="form-group">
              <label for="txnCloseDate">Close Date</label>
              <input type="date" id="txnCloseDate">
            </div>
          </div>
          <div class="form-group">
            <label for="txnNotes">Notes</label>
            <textarea id="txnNotes" rows="2" placeholder="Additional details..."></textarea>
          </div>
          <div style="margin-top:8px;padding-top:14px;border-top:1px solid var(--gray-100);">
            <div style="font-size:.82rem;font-weight:700;color:var(--gray-600);margin-bottom:10px;">Buyer Information</div>
            <div class="form-row">
              <div class="form-group">
                <label for="txnBuyerName">Buyer Name</label>
                <input type="text" id="txnBuyerName" placeholder="Full name">
              </div>
              <div class="form-group">
                <label for="txnBuyerPhone">Buyer Phone</label>
                <input type="tel" id="txnBuyerPhone" placeholder="(555) 555-5555">
              </div>
            </div>
            <div class="form-group">
              <label for="txnBuyerEmail">Buyer Email</label>
              <input type="email" id="txnBuyerEmail" placeholder="buyer@email.com">
            </div>
          </div>
          <div style="margin-top:8px;padding-top:14px;border-top:1px solid var(--gray-100);">
            <div style="font-size:.82rem;font-weight:700;color:var(--gray-600);margin-bottom:10px;">Seller Information</div>
            <div class="form-row">
              <div class="form-group">
                <label for="txnSellerName">Seller Name</label>
                <input type="text" id="txnSellerName" placeholder="Full name">
              </div>
              <div class="form-group">
                <label for="txnSellerPhone">Seller Phone</label>
                <input type="tel" id="txnSellerPhone" placeholder="(555) 555-5555">
              </div>
            </div>
            <div class="form-group">
              <label for="txnSellerEmail">Seller Email</label>
              <input type="email" id="txnSellerEmail" placeholder="seller@email.com">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="modal-cancel">Cancel</button>
        <button class="btn btn-primary" data-action="modal-save">Save Transaction</button>
      </div>
    </div>
  </div>

  <!-- Party Edit Modal (buyer/seller from detail view) -->
  <div class="modal-overlay" id="partyModal">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <h3 id="partyModalTitle">Edit Buyer</h3>
        <button class="modal-close" data-action="party-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="partyForm">
          <div class="form-group">
            <label for="partyName">Name</label>
            <input type="text" id="partyName" placeholder="Full name">
          </div>
          <div class="form-group">
            <label for="partyPhone">Phone</label>
            <input type="tel" id="partyPhone" placeholder="(555) 555-5555">
          </div>
          <div class="form-group">
            <label for="partyEmail">Email</label>
            <input type="email" id="partyEmail" placeholder="email@example.com">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="party-modal-close">Cancel</button>
        <button class="btn btn-primary" data-action="party-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
