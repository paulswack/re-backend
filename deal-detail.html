<!DOCTYPE html>
<html lang="en" data-title="Listings — RE Back Office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal Detail — RE Back Office</title>
  <script>
    window._forceDetailMode = true;
    window._forceDetailId = window.location.hash ? window.location.hash.substring(1) : '';
    window._forceDetailFrom = 'dealRoom';
    // Synchronously fetch the deal and inject into localStorage before other scripts load
    // Non-blocking: check token, then let api-bridge handle data loading
    (function() {
      var id = window._forceDetailId;
      if (!id) return;
      var token = localStorage.getItem('reb_jwt');
      if (!token) { window.location.href = 'login.html'; return; }
      try { var p = JSON.parse(atob(token.split('.')[1])); if (p.exp && p.exp * 1000 < Date.now()) { localStorage.removeItem('reb_jwt'); window.location.href = 'login.html'; return; } } catch(e) {}
    })();
  </script>
  <link rel="stylesheet" href="css/style.css?v=1777073896">
  <style>
    /* ============================================================
       Deal Detail — BoomTown-inspired layout
       Sidebar (left) + Tabbed activity area (right)
       ============================================================ */

    /* Back button */
    .detail-back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: .85rem; font-weight: 600; color: var(--gray-500);
      background: var(--white); border: 1px solid var(--gray-200); border-radius: 99px;
      cursor: pointer; padding: 7px 16px; margin-bottom: 16px;
      transition: all .15s;
    }
    .detail-back-btn:hover { color: var(--indigo); border-color: var(--indigo); background: var(--indigo-light, #EEF2FF); }
    .detail-back-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* ---- 2-column layout ---- */
    .dd-bt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: start;
    }
    .dd-bt-sidebar {
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }
    .dd-bt-main { min-width: 0; }
    @media (max-width: 1100px) {
      .dd-bt-layout { grid-template-columns: 1fr; }
      .dd-bt-sidebar { position: static; }
    }

    /* ---- Photo hero card ---- */
    .dd-photo {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: relative;
    }
    .dd-photo-img {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 50%, #DBEAFE 100%);
      display: flex; align-items: center; justify-content: center;
      color: rgba(99,102,241,.35);
    }
    .dd-photo-img svg { width: 76px; height: 76px; fill: currentColor; }
    .dd-photo-status {
      position: absolute; top: 12px; left: 12px;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; font-weight: 800;
      letter-spacing: .5px; text-transform: uppercase;
      padding: 7px 13px;
      border-radius: 99px;
      color: #fff;
      background: rgba(15,23,42,.78);
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .dd-photo-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(255,255,255,.25);
    }

    /* ---- Identity card ---- */
    .dd-identity {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px 20px;
    }
    .dd-identity .ie-field {
      width: 100%;
      border: 1.5px solid transparent;
      background: transparent;
      border-radius: 8px;
      padding: 3px 8px;
      font-family: inherit;
      transition: background .15s, border-color .15s;
    }
    .dd-identity .ie-field:hover { background: var(--gray-50); }
    .dd-identity .ie-field:focus {
      background: var(--white); border-color: var(--indigo); outline: none;
    }
    .dd-address-input {
      font-size: 1.35rem; font-weight: 800;
      color: var(--gray-900); letter-spacing: -.3px;
      line-height: 1.25;
    }
    .dd-csz-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 2px;
      margin-top: 4px;
    }
    .dd-csz-row .ie-field {
      font-size: .9rem;
      color: var(--gray-500);
      font-weight: 500;
    }
    .dd-price-input {
      font-size: 1.9rem; font-weight: 800;
      margin-top: 14px;
      line-height: 1;
    }

    /* ---- Pipeline stage tracker ---- */
    .dd-pipeline {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--gray-100);
    }
    .dd-pipeline-bar {
      display: flex; gap: 4px;
    }
    .dd-pipeline-step {
      flex: 1; height: 6px; border-radius: 3px;
      background: var(--gray-200);
      transition: background .2s;
    }
    .dd-pipeline-step.done { background: var(--emerald); }
    .dd-pipeline-label {
      margin-top: 9px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .dd-pipeline-label > span:first-child { color: var(--gray-400); }
    .dd-pipeline-label > span:last-child { color: var(--gray-800); }

    /* ---- Quick stats (beds/baths/sqft) ---- */
    .dd-quickstats {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      overflow: hidden;
    }
    .dd-qs-cell {
      padding: 18px 8px;
      text-align: center;
      border-right: 1px solid var(--gray-100);
    }
    .dd-qs-cell:last-child { border-right: none; }
    .dd-qs-cell input {
      width: 100%;
      text-align: center;
      font-size: 1.35rem; font-weight: 800;
      color: var(--gray-900); line-height: 1;
      border: 1.5px solid transparent;
      background: transparent;
      border-radius: 6px;
      padding: 2px 4px;
      font-family: inherit;
      transition: all .15s;
    }
    .dd-qs-cell input:hover { background: var(--gray-50); }
    .dd-qs-cell input:focus {
      background: var(--white); border-color: var(--indigo); outline: none;
    }
    .dd-qs-lbl {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--gray-400);
      margin-top: 7px;
    }

    /* ---- Key facts panel ---- */
    .dd-facts {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .dd-facts-title {
      padding: 14px 18px 10px;
      font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--gray-400);
      border-bottom: 1px solid var(--gray-100);
    }
    .dd-fact-row {
      display: flex; align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--gray-50);
      gap: 10px;
    }
    .dd-fact-row:last-child { border-bottom: none; }
    .dd-fact-label {
      font-size: .76rem; font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase; letter-spacing: .3px;
      flex: 0 0 86px;
    }
    .dd-fact-value { flex: 1; min-width: 0; }
    .dd-fact-value input,
    .dd-fact-value select {
      width: 100%;
      font-size: .9rem; font-weight: 600;
      color: var(--gray-800);
      background: transparent;
      border: 1.5px solid transparent;
      border-radius: 6px;
      padding: 4px 6px;
      font-family: inherit;
      transition: all .15s;
      cursor: pointer;
    }
    .dd-fact-value input:hover,
    .dd-fact-value select:hover { background: var(--gray-50); }
    .dd-fact-value input:focus,
    .dd-fact-value select:focus {
      background: var(--white); border-color: var(--indigo); outline: none;
    }

    /* ---- Action buttons row ---- */
    /* ============================================================
       AI Insights (Risk Flagger)
       ============================================================ */
    .dd-risks {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .dd-risks-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-100);
      background: linear-gradient(135deg, #F5F3FF 0%, #EEF2FF 100%);
    }
    .dd-risks-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      font-weight: 800;
      color: #4338CA;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .dd-risks-title svg { color: #4338CA; }
    .dd-risks-refresh {
      background: var(--white);
      border: 1px solid var(--gray-200);
      color: #4338CA;
      border-radius: 99px;
      padding: 5px 12px;
      font-size: .72rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .dd-risks-refresh:hover { background: #EEF2FF; border-color: var(--indigo); }
    .dd-risks-refresh:disabled { opacity: .5; cursor: wait; }
    .dd-risks-body { padding: 12px 14px; }
    .dd-risks-empty {
      font-size: .82rem;
      color: var(--gray-500);
      line-height: 1.5;
      padding: 6px 4px;
    }
    .dd-risks-empty strong { color: var(--gray-800); }
    .dd-risks-error {
      font-size: .82rem;
      color: var(--rose);
      background: #FEF2F2;
      padding: 10px 12px;
      border-radius: 8px;
    }
    .dd-risks-clear {
      font-size: .85rem;
      color: var(--emerald);
      font-weight: 600;
      padding: 6px 4px;
    }
    .dd-risks-when {
      font-size: .68rem;
      color: var(--gray-400);
      margin-top: 8px;
      padding: 0 4px;
    }
    .dd-risks-clear .dd-risks-when { margin-left: 8px; font-weight: 500; }
    .dd-risks-loading {
      font-size: .85rem;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
    }
    .dd-spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--gray-200);
      border-top-color: var(--indigo);
      border-radius: 50%;
      display: inline-block;
      animation: dd-spin .8s linear infinite;
    }
    @keyframes dd-spin { to { transform: rotate(360deg); } }

    .dd-risk {
      border-left: 3px solid var(--gray-300);
      padding: 9px 12px;
      margin-bottom: 8px;
      background: var(--gray-50);
      border-radius: 6px;
    }
    .dd-risk:last-of-type { margin-bottom: 0; }
    .dd-risk-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .dd-risk-sev {
      font-size: .6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .dd-risk-title { font-size: .85rem; font-weight: 700; color: var(--gray-900); flex: 1; }
    .dd-risk-msg { font-size: .78rem; color: var(--gray-600); line-height: 1.45; margin-bottom: 5px; }
    .dd-risk-action { font-size: .76rem; color: var(--gray-700); line-height: 1.45; }
    .dd-risk-action strong { color: var(--indigo); font-weight: 700; }

    .dd-risk-high { border-left-color: #DC2626; background: #FEF2F2; }
    .dd-risk-high .dd-risk-sev { background: #FEE2E2; color: #B91C1C; }
    .dd-risk-medium { border-left-color: #D97706; background: #FFFBEB; }
    .dd-risk-medium .dd-risk-sev { background: #FEF3C7; color: #92400E; }
    .dd-risk-low { border-left-color: var(--gray-400); background: var(--gray-50); }
    .dd-risk-low .dd-risk-sev { background: var(--gray-100); color: var(--gray-600); }

    /* Map preview */
    .dd-map {
      display: block;
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      aspect-ratio: 4 / 3;
      text-decoration: none;
      position: relative;
    }
    .dd-map iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      pointer-events: none;
    }
    .dd-map::after {
      content: '↗ Open in Maps';
      position: absolute;
      bottom: 10px; right: 10px;
      background: rgba(15,23,42,.78);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: 6px 11px;
      border-radius: 99px;
      letter-spacing: .2px;
      backdrop-filter: blur(6px);
      transition: background .15s;
    }
    .dd-map:hover::after { background: var(--indigo); }

    /* Commission breakdown */
    .dd-commission {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .dd-commission-header {
      padding: 13px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--gray-100);
    }
    .dd-commission-title {
      font-size: .72rem; font-weight: 800;
      color: var(--gray-500);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .dd-commission-rate {
      font-size: .72rem; font-weight: 600;
      color: var(--gray-400);
      font-variant-numeric: tabular-nums;
    }
    .dd-commission-cells {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }
    .dd-commission-cell {
      padding: 16px 6px;
      text-align: center;
      border-right: 1px solid var(--gray-100);
    }
    .dd-commission-cell:last-child { border-right: none; }
    .dd-commission-cell-val {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--gray-900);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .dd-commission-cell-lbl {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--gray-400);
      margin-top: 6px;
    }
    .dd-commission-cell-net {
      background: linear-gradient(135deg, #ECFDF5 0%, #F0FDF4 100%);
    }
    .dd-commission-cell-net .dd-commission-cell-val { color: #047857; }
    .dd-commission-cell-net .dd-commission-cell-lbl { color: #047857; }

    .dd-actions {
      display: flex; gap: 8px;
    }
    .dd-action-btn {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 12px;
      border-radius: 12px;
      font-size: .82rem; font-weight: 700;
      border: none; cursor: pointer;
      text-decoration: none; font-family: inherit;
      transition: filter .15s, transform .15s;
    }
    .dd-action-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .dd-action-zillow { background: #006AFF; color: #fff; }
    .dd-action-share { background: var(--indigo); color: #fff; }
    .dd-action-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* ---- Sellers sub-card in sidebar ---- */
    .dd-sellers {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .dd-sellers-header {
      padding: 14px 18px;
      font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--gray-400);
      border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between;
    }
    .dd-sellers-add {
      background: var(--white);
      border: 1px solid var(--gray-200);
      color: var(--gray-600);
      border-radius: 99px;
      padding: 3px 11px;
      font-size: .68rem; font-weight: 700;
      cursor: pointer;
    }
    .dd-sellers-add:hover { border-color: var(--indigo); color: var(--indigo); }
    .dd-sellers-body { padding: 12px 14px; }
    .dd-sellers-body input {
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      border-radius: 6px;
      padding: 5px 9px;
      font-family: inherit;
      font-size: .82rem;
      transition: border-color .15s;
      width: 100%;
    }
    .dd-sellers-body input:focus { border-color: var(--indigo); outline: none; }

    /* ---- Tabs (main area) ---- */
    .dd-tabs {
      display: flex; gap: 2px;
      margin-bottom: 18px;
      border-bottom: 2px solid var(--gray-200);
      padding: 0 2px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .dd-tab {
      padding: 13px 18px;
      font-size: .88rem; font-weight: 700;
      color: var(--gray-500);
      background: transparent;
      border: none; cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .dd-tab:hover { color: var(--gray-800); }
    .dd-tab.active {
      color: var(--indigo);
      border-bottom-color: var(--indigo);
    }
    .dd-tab-count {
      display: inline-block;
      margin-left: 6px;
      font-size: .68rem; font-weight: 700;
      background: var(--gray-100);
      color: var(--gray-500);
      padding: 2px 8px;
      border-radius: 99px;
      vertical-align: 1px;
    }
    .dd-tab.active .dd-tab-count {
      background: var(--indigo-light);
      color: var(--indigo);
    }

    .dd-tab-pane { display: none; }
    .dd-tab-pane.active { display: block; }

    /* ---- Activity timeline ---- */
    .dd-add-note {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 16px 18px;
      margin-bottom: 22px;
    }
    .dd-add-note textarea {
      width: 100%;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .92rem;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      color: var(--gray-800);
      background: var(--white);
      transition: border-color .15s;
    }
    .dd-add-note textarea:focus {
      border-color: var(--indigo); outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,.10);
    }
    .dd-add-note-actions {
      display: flex; justify-content: flex-end; margin-top: 10px;
    }

    .dd-timeline {
      position: relative;
      padding-left: 30px;
    }
    .dd-timeline::before {
      content: '';
      position: absolute;
      left: 12px; top: 6px; bottom: 6px;
      width: 2px;
      background: var(--gray-100);
    }
    .dd-tl-item {
      position: relative;
      padding-bottom: 22px;
    }
    .dd-tl-item:last-child { padding-bottom: 0; }
    .dd-tl-dot {
      position: absolute;
      left: -30px; top: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
      background: var(--white);
      border: 2px solid var(--gray-200);
    }
    .dd-tl-dot.update { border-color: var(--indigo); background: var(--indigo-light); color: var(--indigo); }
    .dd-tl-dot.note { border-color: var(--amber); background: var(--amber-light); color: var(--amber); }
    .dd-tl-body {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: var(--shadow-sm);
    }
    .dd-tl-meta {
      font-size: .72rem;
      color: var(--gray-400);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .dd-tl-title {
      font-size: .92rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .dd-tl-text {
      font-size: .88rem;
      color: var(--gray-600);
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .dd-empty {
      text-align: center;
      padding: 40px 24px;
      color: var(--gray-400);
      font-size: .9rem;
      font-style: italic;
    }

    /* ---- Card overrides inside tab panes ---- */
    /* Existing .parties-card / .notes-card sections render inside tabs as
       distinct cards with consistent treatment */
    .dd-tab-pane .parties-card,
    .dd-tab-pane .notes-card,
    .dd-tab-pane .desc-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 18px;
    }
    .dd-tab-pane .parties-card-header,
    .dd-tab-pane .notes-card-header,
    .dd-tab-pane .desc-card-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--gray-100);
      font-size: 1rem; font-weight: 700;
      color: var(--gray-900);
      background: var(--white) !important;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .dd-tab-pane .parties-card-header > span:first-child,
    .dd-tab-pane .notes-card-header > span:first-child,
    .dd-tab-pane .desc-card-header > span:first-child {
      color: var(--gray-900) !important;
      font-size: 1rem; font-weight: 700;
    }
    .dd-tab-pane .parties-card:last-child,
    .dd-tab-pane .notes-card:last-child,
    .dd-tab-pane .desc-card:last-child { margin-bottom: 0; }

    /* ============================================================
       Checklist — Linear-style single-column list, grouped by urgency
       ============================================================ */
    .cl-section { margin-bottom: 6px; }
    .cl-section-header {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 16px;
      font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--gray-500);
      cursor: pointer;
      user-select: none;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
      border-bottom: 1px solid var(--gray-100);
    }
    .cl-section-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .cl-section-label { flex-shrink: 0; }
    .cl-section-count {
      background: var(--white);
      color: var(--gray-700);
      padding: 1px 9px;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: 0;
    }
    .cl-section-chevron {
      margin-left: auto;
      color: var(--gray-400);
      transition: transform .15s;
      flex-shrink: 0;
    }
    .cl-section-collapsed .cl-section-chevron { transform: rotate(-90deg); }
    .cl-section-collapsed .cl-section-body { display: none; }
    .cl-section-collapsed .cl-section-header { border-bottom: none; }

    .cl-section-overdue .cl-section-header {
      background: #FEF2F2; color: #B91C1C;
      border-color: #FECACA;
    }
    .cl-section-overdue .cl-section-dot { background: #DC2626; }
    .cl-section-overdue .cl-section-count { background: #fff; color: #B91C1C; }

    .cl-section-week .cl-section-header {
      background: #FFFBEB; color: #92400E;
      border-color: #FDE68A;
    }
    .cl-section-week .cl-section-dot { background: #D97706; }
    .cl-section-week .cl-section-count { background: #fff; color: #92400E; }

    .cl-section-upcoming .cl-section-dot { background: var(--gray-400); }

    .cl-section-done .cl-section-header {
      background: #F0FDF4; color: #065F46;
      border-color: #BBF7D0;
    }
    .cl-section-done .cl-section-dot { background: var(--emerald); }
    .cl-section-done .cl-section-count { background: #fff; color: #065F46; }

    /* Single checklist row */
    .cl-row {
      display: flex; align-items: center; gap: 11px;
      padding: 8px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: background .12s;
    }
    .cl-row:hover { background: #FAFBFD; }
    .cl-row.completed { opacity: .6; }
    .cl-row.completed:hover { opacity: .8; }
    .cl-row-drag {
      color: var(--gray-300);
      cursor: grab;
      flex-shrink: 0;
      font-size: .95rem;
      line-height: 1;
      user-select: none;
      opacity: 0;
      transition: opacity .15s;
      width: 10px;
    }
    .cl-row:hover .cl-row-drag { opacity: 1; }
    .cl-row-check {
      width: 17px; height: 17px;
      flex-shrink: 0;
      accent-color: var(--emerald);
      cursor: pointer;
      margin: 0;
    }
    .cl-row-body { flex: 1; min-width: 0; }
    .cl-row-title {
      font-size: .84rem;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.3;
    }
    .cl-row.completed .cl-row-title {
      text-decoration: line-through;
      color: var(--gray-500);
    }
    .cl-row-meta {
      font-size: .72rem;
      color: var(--gray-500);
      margin-top: 2px;
      line-height: 1.4;
      word-break: break-word;
    }
    .cl-row-date {
      flex-shrink: 0;
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
      letter-spacing: .2px;
    }
    .cl-row-date.overdue { background: #FEE2E2; color: #DC2626; }
    .cl-row-date.soon { background: #FEF3C7; color: #B45309; }
    .cl-row-date.future { background: var(--gray-100); color: var(--gray-700); }
    .cl-row-date.done {
      background: var(--emerald-light); color: #065F46;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .cl-row-date.done svg { display: block; }

    /* Add new item row */
    .cl-add-row {
      display: flex; gap: 8px;
      padding: 14px 18px;
      align-items: center;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
    }
    .cl-add-row input {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .85rem;
      outline: none;
      font-family: inherit;
      background: var(--white);
      color: var(--gray-800);
      transition: border-color .15s;
    }
    .cl-add-row input:focus { border-color: var(--indigo); }
    .cl-add-row .btn { padding: 7px 14px; font-size: .82rem; }

    /* Notes */
    .note-input-area { padding: 14px 20px; border-bottom: 1px solid var(--gray-100); }
    .note-input-area textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
      border-radius: 10px; font-size: .85rem; font-family: inherit;
      resize: vertical; min-height: 50px; color: var(--gray-800);
      transition: border-color .15s;
    }
    .note-input-area textarea:focus {
      border-color: var(--indigo); outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    .note-input-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .note-item { padding: 12px 20px; border-bottom: 1px solid var(--gray-50); }
    .note-item:last-child { border-bottom: none; }
    .note-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .note-author { font-size: .8rem; font-weight: 600; color: var(--gray-700); }
    .note-time { font-size: .7rem; color: var(--gray-400); }
    .note-text { font-size: .85rem; color: var(--gray-600); line-height: 1.5; }

    /* List header (for form view) */
    .lst-stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .lst-row-address { flex: 2; min-width: 0; }
    .lst-row-address-text { font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lst-row-price { width: 120px; font-weight: 700; color: var(--gray-900); text-align: right; flex-shrink: 0; }
    .lst-row-specs { width: 160px; font-size: .82rem; color: var(--gray-500); flex-shrink: 0; }
    .lst-row-agent { width: 180px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .lst-row-agent-name { font-size: .85rem; color: var(--gray-600); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lst-row-status { width: 100px; flex-shrink: 0; text-align: center; }
    .lst-row-date { width: 120px; font-size: .82rem; color: var(--gray-400); text-align: right; flex-shrink: 0; }
    .list-header {
      display: flex; align-items: center; gap: 14px; padding: 10px 20px;
      font-size: .7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400);
      border-bottom: 1px solid var(--gray-100); background: var(--gray-50);
      border-radius: 16px 16px 0 0;
    }

    /* Expand panel grid */
    .cl-expand-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* Responsive */
    @media (max-width: 768px) {
      .lst-row-specs, .lst-row-date { display: none; }
      .detail-back-btn { font-size: .8rem; padding: 6px 12px; }
      .detail-csz-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 480px) {
      .lst-stats-grid { grid-template-columns: 1fr 1fr; }
      .detail-header-card, .parties-card, .desc-card, .notes-card { border-radius: 12px; }
      .cl-expand-grid { grid-template-columns: 1fr !important; }
    }
  </style>
