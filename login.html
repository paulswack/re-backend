<!DOCTYPE html>
<html lang="en" data-title="Sign In — RE Back Office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — RE Back Office</title>
  <style>
    :root {
      --indigo: #6366F1;
      --indigo-dark: #4F46E5;
      --violet: #8B5CF6;
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-400: #94A3B8;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1E293B;
      --gray-900: #0F172A;
      --rose: #F43F5E;
      --emerald: #10B981;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--font); -webkit-font-smoothing: antialiased; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--indigo), var(--violet), #6D28D9);
    }

    .login-container {
      width: 100%; max-width: 400px; padding: 24px;
    }

    .login-logo {
      text-align: center; margin-bottom: 32px;
    }

    .login-logo-mark {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(255,255,255,.15); backdrop-filter: blur(8px);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px; border: 1px solid rgba(255,255,255,.2);
    }

    .login-logo-mark svg { width: 26px; height: 26px; fill: #fff; }

    .login-logo h1 {
      font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 4px;
    }

    .login-logo p { font-size: .88rem; color: rgba(255,255,255,.6); }

    .login-card {
      background: #fff; border-radius: 16px; padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block; font-size: .82rem; font-weight: 600;
      color: var(--gray-700); margin-bottom: 6px;
    }

    .form-group input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: .9rem; color: var(--gray-800); background: #fff;
      transition: border-color .15s;
    }

    .form-group input:focus {
      border-color: var(--indigo); outline: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }

    .login-btn {
      display: block; width: 100%;
      background: var(--indigo); color: #fff; padding: 12px;
      border-radius: 8px; font-size: .95rem; font-weight: 700;
      border: none; cursor: pointer; transition: background .15s;
      margin-top: 8px;
    }

    .login-btn:hover { background: var(--indigo-dark); }

    .login-error {
      color: var(--rose); font-size: .82rem; font-weight: 600;
      margin-top: 10px; display: none; text-align: center;
    }

    .demo-hint {
      margin-top: 16px; padding: 12px;
      background: var(--gray-50); border-radius: 8px;
      font-size: .78rem; color: var(--gray-600); text-align: center;
    }

    .demo-hint code {
      background: var(--gray-100); padding: 2px 6px; border-radius: 4px;
      font-family: monospace; font-size: .78rem; color: var(--indigo);
    }

    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: .85rem; color: rgba(255,255,255,.6);
      text-decoration: none; transition: color .15s;
    }

    .back-link:hover { color: #fff; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 10px;
      font-size: .88rem; font-weight: 600; color: #fff;
      background: var(--gray-900); z-index: 9999;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      animation: toastIn .3s ease;
    }
    .toast.success { background: var(--emerald); }
    .toast.error { background: var(--rose); }
    @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 480px) {
      .login-container { padding: 16px; }
      .login-card { padding: 20px; }
      .login-logo h1 { font-size: 1.2rem; }
      .login-logo svg { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="login-logo-mark"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
      <h1>RE Back Office</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="login-card">
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
        <div class="login-error" id="loginError">Invalid username or password.</div>
        <div id="forgotPwSection" style="display:none;margin-top:12px;padding:14px;background:var(--gray-50);border-radius:8px;font-size:.82rem;color:var(--gray-600);text-align:center;line-height:1.6">
          <strong style="color:var(--gray-800);">Need to reset your password?</strong><br>
          Ask your Team Lead — they can reset it from the Team Members page.<br>
          <span style="font-size:.75rem;color:var(--gray-400);margin-top:4px;display:inline-block">Once logged in, you can change your password anytime from your Profile page.</span>
        </div>
        <div style="text-align:center;margin-top:12px">
          <a href="javascript:void(0)" onclick="document.getElementById('forgotPwSection').style.display='block'" style="font-size:.78rem;color:rgba(255,255,255,.5);text-decoration:none">Forgot Password?</a>
        </div>
      </form>
    </div>
    <a href="index.html" class="back-link">Back to homepage</a>
  </div>

  <script src="js/api.js?v=1776903705"></script>
  <script src="js/theme.js?v=1776903705"></script>
  <script src="js/auth.js?v=1776903705"></script>
  <script>
    (function () {
      // If already logged in via API, redirect
      if (API.isLoggedIn()) {
        window.location.href = 'home.html';
        return;
      }
      // Fallback: localStorage auth
      if (Auth.isLoggedIn()) {
        window.location.href = 'home.html';
        return;
      }

      var form = document.getElementById('loginForm');
      var errorEl = document.getElementById('loginError');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorEl.style.display = 'none';

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        // Try server login first
        if (window.location.protocol !== 'file:') {
          var btn = form.querySelector('button[type="submit"]');
          btn.disabled = true;
          btn.textContent = 'Signing in...';

          API.login(username, password).then(function (res) {
            window.location.href = 'home.html';
          }).catch(function (err) {
            // Fallback to localStorage login
            if (Auth.login(username, password)) {
              window.location.href = 'home.html';
            } else {
              errorEl.style.display = 'block';
              btn.disabled = false;
              btn.textContent = 'Sign In';
            }
          });
        } else {
          // File protocol — use localStorage only
          if (Auth.login(username, password)) {
            window.location.href = 'home.html';
          } else {
            errorEl.style.display = 'block';
          }
        }
      });
    })();
  </script>
</body>
</html>
